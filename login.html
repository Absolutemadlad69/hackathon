<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PeopleHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg-body);">
    <div class="card" style="width: 400px; padding: 2rem;">
        <h2 style="text-align: center; margin-bottom: 2rem;">PeopleHub Login</h2>
        <form id="login-form">
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Corporate Email</label>
                <input type="email" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-glass); color: var(--text-primary);" required>
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary);">Password</label>
                <input type="password" style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-glass); color: var(--text-primary);" required>
            </div>
            <button type="submit" style="width: 100%; padding: 0.75rem; border-radius: 8px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600;">Sign In (SSO)</button>
        </form>
    </div>
</body>
</html>
