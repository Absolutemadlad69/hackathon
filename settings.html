<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - PeopleHub</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body style="padding: 2rem; background: var(--bg-body); color: var(--text-primary);">
    <h2>System Settings</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2rem;">Configure organization policies and integrations.</p>
    
    <div class="card" style="margin-bottom: 1rem;">
        <div class="card-header"><h3>Jira Integration</h3></div>
        <div class="card-body">
            <p>Sync status: Active</p>
            <button style="padding: 0.5rem 1rem; border-radius: 6px; background: var(--primary); color: white; border: none; cursor: pointer; margin-top: 1rem;">Configure Sync</button>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header"><h3>Security</h3></div>
        <div class="card-body">
            <p>SSO Configuration and 2FA settings</p>
        </div>
    </div>
    
    <div style="margin-top: 2rem;">
        <a href="index.html" style="color: var(--primary); text-decoration: none;">← Back to Dashboard</a>
    </div>
</body>
</html>
